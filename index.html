<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23020617'/%3E%3Crect x='20' y='45' width='25' height='25' rx='4' fill='%2338bdf8'/%3E%3Cpath d='M60 70 L80 70 L70 50 Z' fill='%23ef4444'/%3E%3C/svg%3E">
    <title>Logan's Geometrie Crash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;900&display=swap');
        body{margin:0;padding:0;overflow:hidden;background:#020617;touch-action:none;font-family:'Inter',sans-serif;color:white;user-select:none;-webkit-user-select:none}
        canvas{display:block;position:absolute;top:0;left:0;z-index:10}
        .font-game{font-family:'Orbitron',sans-serif}
        #orientation-msg{display:none;position:fixed;inset:0;background:#020617;z-index:2000;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
        @media(orientation:portrait){#orientation-msg{display:flex}}
        .ui-layer{position:absolute;inset:0;z-index:100;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .menu-box{background:rgba(2,6,23,0.95);width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;overflow-y:auto;padding:20px}
        .controls-container{position:absolute;width:100%;padding:0 60px;display:flex;justify-content:space-between;align-items:flex-end;z-index:150;pointer-events:none;box-sizing:border-box}
        .ctrl-btn{background:rgba(255,255,255,0.02);border:1px solid rgba(56,189,248,0.1);backdrop-filter:blur(1px);border-radius:22px;display:flex;align-items:center;justify-content:center;pointer-events:auto;-webkit-tap-highlight-color:transparent;transition:transform .1s,background .1s}
        .ctrl-btn:active{background:rgba(56,189,248,0.2);transform:scale(0.92)}
        .btn-arrow{width:90px;height:90px;font-size:2.5rem;color:rgba(56,189,248,0.2)}
        .btn-jump{width:120px;height:120px;border-radius:50%;border-width:2px;border-color:rgba(56,189,248,0.15)}
        .btn-label{font-family:'Orbitron',sans-serif;font-size:11px;text-transform:uppercase;color:rgba(255,255,255,0.1);letter-spacing:2px}
        .btn-menu{width:220px;padding:18px;margin:10px;border-radius:12px;font-weight:900;text-transform:uppercase;letter-spacing:2px;border:none;box-shadow:0 5px 0 rgba(0,0,0,0.3);cursor:pointer;pointer-events:auto}
        .hud-box{background:rgba(30,41,59,0.3);padding:8px 16px;border-radius:12px;border:1px solid rgba(56,189,248,0.1);backdrop-filter:blur(2px)}
        #fs-toggle{position:fixed;top:15px;right:20px;z-index:200;width:45px;height:45px;background:rgba(30,41,59,0.3);border:1px solid rgba(56,189,248,0.1);border-radius:8px;color:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer}
        .shop-item{background:rgba(30,41,59,0.5);border:2px solid rgba(56,189,248,0.2);border-radius:16px;padding:12px;cursor:pointer;transition:all .2s;min-width:80px;text-align:center}
        .shop-item:hover{border-color:rgba(56,189,248,0.5);transform:scale(1.03)}
        .shop-item.owned{border-color:#10b981;background:rgba(16,185,129,0.1)}
        .shop-item.equipped{border-color:#fbbf24;background:rgba(251,191,36,0.15);box-shadow:0 0 20px rgba(251,191,36,0.3)}
        .shop-item.cant-afford{opacity:0.5}
        .coin-display{background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(245,158,11,0.2));border:1px solid rgba(251,191,36,0.4)}
        .badge{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center}
    </style>
</head>
<body>
    <div id="orientation-msg">
        <div class="text-sky-500 text-6xl mb-4 animate-pulse">↻</div>
        <h2 class="font-game text-xl uppercase italic">Bitte drehen</h2>
        <p class="text-slate-400 mt-2 max-w-xs">Logan's Geometrie Crash wird im Querformat gespielt.</p>
    </div>
    <button id="fs-toggle" title="Vollbild" onclick="window.gameControl.toggleFullscreen()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
    </button>
    <div id="ui-layer" class="ui-layer">
        <div id="menu-start" class="menu-box">
            <h1 class="text-3xl md:text-5xl font-game font-black mb-1 italic uppercase tracking-tighter text-center">LOGAN'S <span class="text-sky-500">GEOMETRIE</span> CRASH</h1>
            <p class="text-slate-500 mb-4 text-xs tracking-widest uppercase font-bold text-center">Haptic Edition v6.0</p>
            <div class="coin-display flex items-center gap-2 mb-6 px-5 py-2 rounded-full"><span class="text-2xl">🪙</span><span class="text-xl font-game font-bold text-amber-400" id="menu-coins">0</span></div>
            <div class="flex flex-row flex-wrap justify-center">
                <div class="flex flex-col items-center"><button class="btn-menu bg-emerald-500 text-white font-game" onclick="window.gameControl.start('leicht')">Leicht</button><span class="text-xs text-emerald-400 uppercase font-bold" id="hs-leicht">Best: 0</span></div>
                <div class="flex flex-col items-center"><button class="btn-menu bg-amber-500 text-white font-game" onclick="window.gameControl.start('mittel')">Mittel</button><span class="text-xs text-amber-400 uppercase font-bold" id="hs-mittel">Best: 0</span></div>
                <div class="flex flex-col items-center"><button class="btn-menu bg-rose-500 text-white font-game" onclick="window.gameControl.start('schwer')">Schwer</button><span class="text-xs text-rose-400 uppercase font-bold" id="hs-schwer">Best: 0</span></div>
            </div>
            <button class="btn-menu bg-gradient-to-r from-amber-500 to-yellow-400 text-slate-950 font-game mt-6" onclick="window.gameControl.openShop()">🛒 Shop</button>
        </div>
        <div id="menu-shop" class="menu-box" style="display:none">
            <h2 class="text-3xl font-game font-black text-amber-400 mb-2 italic uppercase">🏪 Logan's Shop</h2>
            <div class="coin-display flex items-center gap-2 mb-6 px-5 py-2 rounded-full"><span class="text-2xl">🪙</span><span class="text-xl font-game font-bold text-amber-400" id="shop-coins">0</span></div>
            <h3 class="text-base font-game text-sky-400 mb-3">🎨 Spieler-Skins</h3>
            <div class="flex flex-wrap justify-center gap-2 mb-6 max-w-xl" id="shop-skins"></div>
            <h3 class="text-base font-game text-sky-400 mb-3">✨ Trail-Effekte</h3>
            <div class="flex flex-wrap justify-center gap-2 mb-4 max-w-xl" id="shop-trails"></div>
            <button class="btn-menu bg-sky-600 text-white font-game shadow-none mt-4" onclick="window.gameControl.home()">Zurück</button>
        </div>
        <div id="menu-crash" class="menu-box" style="display:none">
            <h2 class="text-4xl font-game font-black text-rose-500 mb-2 italic uppercase text-center">💥 Crash!</h2>
            <div class="text-6xl font-game font-black text-white mb-2" id="final-score">0</div>
            <div class="coin-display flex items-center gap-2 mb-4 px-4 py-2 rounded-full"><span class="text-lg">+🪙</span><span class="text-lg font-game font-bold text-amber-400" id="session-coins">0</span></div>
            <div class="text-sky-400 text-xs font-bold uppercase mb-6 tracking-widest" id="new-record-msg" style="display:none">🎉 NEUER REKORD!</div>
            <div class="flex flex-row space-x-4">
                <button class="btn-menu bg-sky-500 text-slate-950 font-game shadow-none" onclick="window.gameControl.start(window.currentDiff)">Nochmal</button>
                <button class="btn-menu bg-white text-slate-950 font-game shadow-none" onclick="window.gameControl.home()">Menü</button>
            </div>
        </div>
    </div>
    <div id="hud" class="fixed top-4 left-6 flex space-x-3 z-[120] pointer-events-none" style="display:none">
        <div class="hud-box"><div class="text-xs text-sky-400 uppercase font-black">Score</div><div class="text-2xl font-black font-game leading-tight" id="live-score">0</div></div>
        <div class="hud-box coin-display"><div class="text-xs text-amber-400 uppercase font-black">🪙</div><div class="text-lg font-bold font-game leading-tight text-amber-400" id="live-coins">0</div></div>
        <div class="hud-box text-right"><div class="text-xs text-slate-400 uppercase font-black">Best (<span id="hud-mode-name">-</span>)</div><div class="text-xl font-bold font-game leading-tight" id="hud-best">0</div></div>
    </div>
    <div id="powerup-display" class="fixed bottom-32 left-1/2 transform -translate-x-1/2 z-[130] pointer-events-none text-3xl" style="display:none"></div>
    <canvas id="powerupCanvas" class="fixed z-[131] pointer-events-none" width="90" height="90" style="display:none;left:50%;transform:translateX(-50%);"></canvas>
    <div id="controls" class="controls-container" style="display:none">
        <div class="flex space-x-10"><div id="btn-L" class="ctrl-btn btn-arrow"><span style="font-size:2rem;color:rgba(56,189,248,0.3)">&#8592;</span></div><div id="btn-R" class="ctrl-btn btn-arrow"><span style="font-size:2rem;color:rgba(56,189,248,0.3)">&#8594;</span></div></div>
        <div><div id="btn-J" class="ctrl-btn btn-jump"><span class="btn-label">Jump</span></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>
<script>
(function(){
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const HS_PREFIX='logans_crash_hs_v50_';
const COINS_KEY='logans_crash_coins_v50';
const SKINS_KEY='logans_crash_skins_v50';
const TRAILS_KEY='logans_crash_trails_v50';
const EQUIPPED_SKIN_KEY='logans_crash_equipped_skin_v50';
const EQUIPPED_TRAIL_KEY='logans_crash_equipped_trail_v50';
const SKINS=[
{id:'default',name:'Standard',color:'#38bdf8',shape:'square',price:0},
{id:'red',name:'Rot Feuer',color:'#ef4444',shape:'square',price:5},
{id:'green',name:'Grün Kraft',color:'#22c55e',shape:'square',price:5},
{id:'purple',name:'Lila Traum',color:'#a855f7',shape:'square',price:10},
{id:'gold',name:'Gold Spieler',color:'#fbbf24',shape:'square',price:15},
{id:'rainbow',name:'Regenbogen',color:'rainbow',shape:'square',price:30},
{id:'diamond',name:'Diamant',color:'#06b6d4',shape:'diamond',price:25},
{id:'star',name:'Star',color:'#f472b6',shape:'star',price:40},
{id:'austria',name:'🇦🇹 Österreich',color:'#ed2939',color2:'#fff',pattern:'h3stripe',price:20},
{id:'brazil',name:'🇧🇷 Brasilien',color:'#fcd34d',color2:'#16a34a',pattern:'hstripe',price:20},
{id:'argentina',name:'🇦🇷 Argentinien',color:'#7dd3fc',color2:'#fff',pattern:'vstripe',price:20},
{id:'germany',name:'🇩🇪 Deutschland',color:'#fafafa',color2:'#1e293b',pattern:'solid_accent',price:20},
{id:'spain',name:'🇪🇸 Spanien',color:'#dc2626',color2:'#fbbf24',pattern:'hstripe',price:20},
{id:'france',name:'🇫🇷 Frankreich',color:'#3b82f6',color2:'#fff',pattern:'vstripe',price:20},
{id:'italy',name:'🇮🇹 Italien',color:'#16a34a',color2:'#dc2626',pattern:'topstripe',price:20},
{id:'england',name:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 England',color:'#fafafa',color2:'#1e3a5f',pattern:'vstripe',price:20}
];
const TRAILS=[
{id:'default',name:'Standard',color:'#38bdf8',price:0},
{id:'fire',name:'Feuer',color:'#ef4444',price:10},
{id:'ice',name:'Eis',color:'#06b6d4',price:10},
{id:'toxic',name:'Toxisch',color:'#22c55e',price:15},
{id:'cosmic',name:'Kosmos',color:'#a855f7',price:20},
{id:'gold',name:'Gold',color:'#fbbf24',price:25},
{id:'rainbow',name:'Regenbogen',color:'rainbow',price:50},
{id:'stardust',name:'Sternenstaub',type:'stardust',color:'#fcd34d',price:35},
{id:'bubbles',name:'Seifenblasen',type:'bubbles',color:'#93c5fd',price:30},
{id:'sparks',name:'Funken',type:'sparks',color:'#f97316',price:40},
{id:'lightning',name:'Blitz',type:'lightning',color:'#c084fc',price:45},
{id:'hearts',name:'Herzen',type:'hearts',color:'#fb7185',price:25}
];
let trailParticles=[];
let audioCtx=null,musicTimer=null;
let cw,ch,active=false,score=0,sessionCoins=0;
let lastTime=0,spawnAccumulator=0,sideAccumulator=0,powerupAccumulator=0,coinAccumulator=0;
let comboCount=0,comboTimer=0,lastJumpTime=0,jumpClearedCount=0;
let clearedEnemiesThisJump=[]; // Track enemies cleared during current jump
let activePowerup=null,powerupEndTime=0;
let shakeIntensity=0,shakeX=0,shakeY=0;
let stars=[],rainbowHue=0;
const input={L:false,R:false,J:false};
const ui={
start:document.getElementById('menu-start'),shop:document.getElementById('menu-shop'),
crash:document.getElementById('menu-crash'),controls:document.getElementById('controls'),
hud:document.getElementById('hud'),live:document.getElementById('live-score'),
liveCoins:document.getElementById('live-coins'),final:document.getElementById('final-score'),
sessionCoins:document.getElementById('session-coins'),hudBest:document.getElementById('hud-best'),
hudMode:document.getElementById('hud-mode-name'),newRecord:document.getElementById('new-record-msg'),
menuCoins:document.getElementById('menu-coins'),shopCoins:document.getElementById('shop-coins'),
powerupDisplay:document.getElementById('powerup-display'),
hsLabels:{leicht:document.getElementById('hs-leicht'),mittel:document.getElementById('hs-mittel'),schwer:document.getElementById('hs-schwer')}
};
const settings={
leicht:{jP:-12.5,spawnMs:1450,sideMs:4000,powerupMs:8000,coinMs:3500,g:0.38,speed:9.0,color:'#10b981'},
mittel:{jP:-11.5,spawnMs:1050,sideMs:3000,powerupMs:6000,coinMs:2800,g:0.44,speed:10.5,color:'#f59e0b'},
schwer:{jP:-10.5,spawnMs:750,sideMs:2200,powerupMs:4500,coinMs:2200,g:0.50,speed:12.0,color:'#ef4444'}
};
const player={x:0,y:0,size:38,vy:0,g:0.42,jP:-12,ground:0,speed:9,jumping:false,trail:[]};
let enemies=[],sides=[],fx=[],coins=[],powerups=[];

function getCoins(){return parseInt(localStorage.getItem(COINS_KEY)||'0')}
function addCoins(n){const c=getCoins()+n;localStorage.setItem(COINS_KEY,c);return c}
function spendCoins(n){const c=getCoins();if(c<n)return false;localStorage.setItem(COINS_KEY,c-n);return true}
function getOwnedSkins(){return JSON.parse(localStorage.getItem(SKINS_KEY)||'["default"]')}
function getOwnedTrails(){return JSON.parse(localStorage.getItem(TRAILS_KEY)||'["default"]')}
function getEquippedSkin(){return localStorage.getItem(EQUIPPED_SKIN_KEY)||'default'}
function getEquippedTrail(){return localStorage.getItem(EQUIPPED_TRAIL_KEY)||'default'}
function setEquippedSkin(id){localStorage.setItem(EQUIPPED_SKIN_KEY,id)}
function setEquippedTrail(id){localStorage.setItem(EQUIPPED_TRAIL_KEY,id)}
function unlockSkin(id){const o=getOwnedSkins();if(!o.includes(id)){o.push(id);localStorage.setItem(SKINS_KEY,JSON.stringify(o))}}
function unlockTrail(id){const o=getOwnedTrails();if(!o.includes(id)){o.push(id);localStorage.setItem(TRAILS_KEY,JSON.stringify(o))}}

function svgBadgeCheck(){return'<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="#10b981"/><polyline points="6,11 10,15 16,7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'}
function svgBadgeStar(){return'<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="#fbbf24"/><polygon points="11,3 13.1,8.5 19,8.5 14.3,12.2 16.1,18 11,14.3 5.9,18 7.7,12.2 3,8.5 8.9,8.5" fill="#020617"/></svg>'}
function svgBadgeLock(){return'<svg width="22" height="22" viewBox="0 0 22 22"><rect x="3" y="9" width="16" height="11" rx="2" fill="rgba(100,116,139,0.9)"/><path d="M7 9V7a4 4 0 0 1 8 0v2" stroke="rgba(100,116,139,0.9)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>'}
function renderShop(){
const coins=getCoins();
ui.menuCoins.innerText=coins;ui.shopCoins.innerText=coins;
const ownedSkins=getOwnedSkins(),equippedSkin=getEquippedSkin();
const ownedTrails=getOwnedTrails(),equippedTrail=getEquippedTrail();
const skinsContainer=document.getElementById('shop-skins');
skinsContainer.innerHTML='';
SKINS.forEach(skin=>{
const isOwned=ownedSkins.includes(skin.id),isEquipped=equippedSkin===skin.id;
const canAfford=coins>=skin.price;
let bgStyle;
if(skin.color==='rainbow'){
  bgStyle='background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)';
}else if(skin.pattern==='hstripe'){
  bgStyle='background:linear-gradient(to bottom,'+skin.color+' 50%,'+(skin.color2||skin.color)+' 50%)';
}else if(skin.pattern==='vstripe'){
  bgStyle='background:linear-gradient(to right,'+skin.color+' 50%,'+(skin.color2||skin.color)+' 50%)';
}else if(skin.pattern==='h3stripe'){
  bgStyle='background:linear-gradient(to bottom,'+skin.color+' 33%,'+(skin.color2||'#fff')+' 33%,'+(skin.color2||'#fff')+' 66%,'+skin.color+' 66%)';
}else if(skin.pattern==='topstripe'){
  bgStyle='background:linear-gradient(to bottom,'+skin.color+' 50%,'+(skin.color2||'#000')+' 50%)';
}else if(skin.pattern==='solid_accent'){
  bgStyle='background:'+skin.color;
}else{
  bgStyle='background:'+skin.color;
}
const div=document.createElement('div');
let badge='';
if(isEquipped){badge=svgBadgeStar();}
else if(isOwned){badge=svgBadgeCheck();}
else if(!canAfford){badge=svgBadgeLock();}
const priceTag=!isOwned?'<span class="text-xs text-amber-400 block">$ '+skin.price+'</span>':'';
div.className='shop-item '+(isOwned?(isEquipped?'equipped':'owned'):'')+(!isOwned&&!canAfford?' cant-afford':'');
div.innerHTML='<div class="w-10 h-10 mx-auto rounded-lg mb-2" style="'+bgStyle+'"></div><span class="text-xs font-bold">'+skin.name+'</span>'+priceTag+'<div class="badge">'+badge+'</div>';
div.onclick=()=>{if(isOwned){setEquippedSkin(skin.id);sound.equip();renderShop()}else if(canAfford&&spendCoins(skin.price)){unlockSkin(skin.id);setEquippedSkin(skin.id);sound.purchase();renderShop()}};
skinsContainer.appendChild(div)});
const trailsContainer=document.getElementById('shop-trails');
trailsContainer.innerHTML='';
TRAILS.forEach(trail=>{
const isOwned=ownedTrails.includes(trail.id),isEquipped=equippedTrail===trail.id;
const canAfford=coins>=trail.price;
const bgStyle=trail.color==='rainbow'?'background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)':'background:'+trail.color;
const div=document.createElement('div');
let badge='';
if(isEquipped){badge=svgBadgeStar();}
else if(isOwned){badge=svgBadgeCheck();}
else if(!canAfford){badge=svgBadgeLock();}
const priceTag=!isOwned?'<span class="text-xs text-amber-400 block">$ '+trail.price+'</span>':'';
div.className='shop-item '+(isOwned?(isEquipped?'equipped':'owned'):'')+(!isOwned&&!canAfford?' cant-afford':'');
div.innerHTML='<div class="w-14 h-3 mx-auto rounded-full mb-2" style="'+bgStyle+'"></div><span class="text-xs font-bold">'+trail.name+'</span>'+priceTag+'<div class="badge">'+badge+'</div>';
div.onclick=()=>{if(isOwned){setEquippedTrail(trail.id);sound.equip();renderShop()}else if(canAfford&&spendCoins(trail.price)){unlockTrail(trail.id);setEquippedTrail(trail.id);sound.purchase();renderShop()}};
trailsContainer.appendChild(div)})}

function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*cw,y:Math.random()*ch,size:Math.random()*2+0.5,speed:Math.random()*0.5+0.1,twinkle:Math.random()*Math.PI*2})}
function updateStars(dt){stars.forEach(s=>{s.x-=s.speed*dt;s.twinkle+=0.05*dt;if(s.x<-5){s.x=cw+5;s.y=Math.random()*ch}})}
function drawStars(){stars.forEach(s=>{ctx.globalAlpha=0.3+Math.sin(s.twinkle)*0.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function startMusic(){if(!audioCtx||musicTimer)return;const notes=[110,130.81,146.83,164.81,174.61,164.81,146.83,130.81];let noteIndex=0;function playNote(){if(!active)return;const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type='triangle';osc.frequency.setValueAtTime(notes[noteIndex],audioCtx.currentTime);gain.gain.setValueAtTime(0.06,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.25);osc.connect(gain);gain.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.25);noteIndex=(noteIndex+1)%notes.length;musicTimer=setTimeout(playNote,280)}playNote()}
function stopMusic(){if(musicTimer){clearTimeout(musicTimer);musicTimer=null}}

function triggerJump(){if(!player.jumping&&active){player.vy=player.jP;player.jumping=true;jumpClearedCount=0;clearedEnemiesThisJump=[];const jumpApex=player.ground+player.vy*(Math.abs(player.vy)/player.g)*0.7;enemies.forEach(e=>{const hDist=Math.abs((e.x+e.size/2)-(player.x+player.size/2));if(hDist<player.size+e.size&&e.y>jumpApex&&e.y<player.ground+player.size){e.markedForCombo=true}});sound.jump();haptics.jump();spawnFX(player.x+player.size/2,player.y+player.size,'#38bdf8',10,1);const now=Date.now();if(now-lastJumpTime>=COMBO_WINDOW||comboCount===0)comboCount=1;lastJumpTime=now}}

function getRandomColor(){return'hsl('+Math.floor(Math.random()*360)+',70%,55%)'}
function getRainbowColor(){rainbowHue=(rainbowHue+5)%360;return'hsl('+rainbowHue+',80%,60%)'}
function getEquippedSkinData(){const id=getEquippedSkin();return SKINS.find(s=>s.id===id)||SKINS[0]}
function getEquippedTrailData(){const id=getEquippedTrail();return TRAILS.find(t=>t.id===id)||TRAILS[0]}
function getPlayerColor(){const skin=getEquippedSkinData();return skin.color==='rainbow'?getRainbowColor():skin.color}

function drawPlayerPattern(px,py,size,skin,glowColor){
  const s=skin||getEquippedSkinData();
  const pattern=s.pattern;
  ctx.shadowBlur=glowColor?25:15;
  ctx.shadowColor=glowColor||getPlayerColor();
  if(!pattern||pattern==='solid'){
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,size);
  }else if(pattern==='hstripe'){
    const stripeH=size/2;
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,stripeH);
    ctx.fillStyle=s.color2==='rainbow'?getRainbowColor():(s.color2||s.color);
    ctx.fillRect(px,py+stripeH,size,stripeH);
  }else if(pattern==='vstripe'){
    const stripeW=size/2;
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,stripeW,size);
    ctx.fillStyle=s.color2==='rainbow'?getRainbowColor():(s.color2||s.color);
    ctx.fillRect(px+stripeW,py,stripeW,size);
  }else if(pattern==='h3stripe'){
    const h=size/3;
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,h);
    ctx.fillStyle=s.color2==='rainbow'?getRainbowColor():(s.color2||'#fff');
    ctx.fillRect(px,py+h,size,h);
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py+2*h,size,h);
  }else if(pattern==='topstripe'){
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,size/2);
    ctx.fillStyle=s.color2==='rainbow'?getRainbowColor():(s.color2||'#000');
    ctx.fillRect(px,py+size/2,size,size/2);
  }else if(pattern==='solid_accent'){
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,size);
    ctx.fillStyle=s.color2==='rainbow'?getRainbowColor():(s.color2||'#000');
    ctx.fillRect(px,py+size-4,size,4);
  }else{
    ctx.fillStyle=s.color==='rainbow'?getRainbowColor():s.color;
    ctx.fillRect(px,py,size,size);
  }
  ctx.shadowBlur=0;
}
function getTrailColor(){const trail=getEquippedTrailData();return trail.color==='rainbow'?getRainbowColor():trail.color}

function activatePowerup(type){activePowerup=type;powerupEndTime=Date.now()+7000;sound.powerup();haptics.powerup();const pc=document.getElementById('powerupCanvas');if(pc){pc.style.display='block';drawPowerupSymbol(pc,type)}}



function drawPowerupSymbol(canvas,type){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const cx=canvas.width/2,cy=canvas.height/2;const colors={shield:'#fbbf24',magnet:'#ef4444',slowmo:'#06b6d4'};const color=colors[type]||'#fff';const remaining=Math.max(0,powerupEndTime-Date.now());const progress=remaining/7000;const blink=remaining<=2000&&Math.floor(Date.now()/200)%2===0;ctx.globalAlpha=blink?0.3:1;ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(cx,cy,36,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=color;ctx.lineWidth=5;ctx.lineCap='round';ctx.shadowBlur=10;ctx.shadowColor=color;ctx.beginPath();ctx.arc(cx,cy,36,-Math.PI/2,-Math.PI/2+progress*Math.PI*2,false);ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle=color;ctx.shadowBlur=12;ctx.shadowColor=color;if(type==='shield'){ctx.fillRect(cx-8,cy-8,16,16)}else if(type==='magnet'){ctx.beginPath();ctx.moveTo(cx-10,cy-8);ctx.lineTo(cx-4,cy+10);ctx.lineTo(cx+4,cy+10);ctx.lineTo(cx+10,cy-8);ctx.closePath();ctx.fill();ctx.beginPath();ctx.arc(cx-7,cy-8,4,Math.PI,0);ctx.stroke();ctx.beginPath();ctx.arc(cx+7,cy-8,4,Math.PI,0);ctx.stroke()}else if(type==='slowmo'){ctx.font='bold 20px Orbitron,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('>>',cx,cy+1)}ctx.shadowBlur=0;ctx.globalAlpha=1}

function update(dt){if(!active)return;const s=settings[window.currentDiff];const timeScale=activePowerup==='slowmo'?0.4:1;const scaledDt=dt*timeScale;if(activePowerup&&Date.now()>powerupEndTime){activePowerup=null;const pc=document.getElementById('powerupCanvas');if(pc)pc.style.display='none'}if(activePowerup){const pc=document.getElementById('powerupCanvas');if(pc){pc.style.display='block';pc.style.bottom=(ch-player.ground+30)+'px'}drawPowerupSymbol(pc,activePowerup)}if(input.L)player.x-=player.speed*scaledDt;if(input.R)player.x+=player.speed*scaledDt;player.x=Math.max(0,Math.min(cw-player.size,player.x));player.vy+=player.g*scaledDt;player.y+=player.vy*scaledDt;player.trail.push({x:player.x,y:player.y});if(player.trail.length>10)player.trail.shift();const eqTrail=getEquippedTrailData();if(eqTrail.type){if(Math.random()<0.4){if(eqTrail.type==='stardust'){trailParticles.push({x:player.x+player.size/2+(Math.random()-0.5)*20,y:player.y+player.size/2+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*1,vy:(Math.random()-0.5)*1,l:1.0,col:eqTrail.color,sz:2})}else if(eqTrail.type==='bubbles'){trailParticles.push({x:player.x+player.size/2+(Math.random()-0.5)*15,y:player.y+player.size/2,vx:(Math.random()-0.5)*0.5,vy:-1.5,l:1.2,col:eqTrail.color,sz:4+Math.random()*4})}else if(eqTrail.type==='sparks'){trailParticles.push({x:player.x+player.size/2+(Math.random()-0.5)*10,y:player.y,vx:(Math.random()-0.5)*2,vy:2+Math.random()*2,l:0.8,col:eqTrail.color,sz:2})}else if(eqTrail.type==='lightning'){trailParticles.push({x:player.x+player.size/2,y:player.y+player.size/2,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,l:0.5,col:eqTrail.color,sz:2})}else if(eqTrail.type==='hearts'){trailParticles.push({x:player.x+player.size/2+(Math.random()-0.5)*15,y:player.y+player.size/2,vx:(Math.random()-0.5)*1,vy:-1,l:1.0,col:eqTrail.color,sz:6})}}trailParticles=trailParticles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.l-=0.025;return p.l>0});const msPerFrame=dt*16.66;spawnAccumulator+=msPerFrame;sideAccumulator+=msPerFrame;powerupAccumulator+=msPerFrame;coinAccumulator+=msPerFrame;if(spawnAccumulator>=s.spawnMs){spawnEnemy();spawnAccumulator=0}if(sideAccumulator>=s.sideMs){spawnSide();sideAccumulator=0}if(powerupAccumulator>=s.powerupMs){if(Math.random()>0.5)spawnPowerup();powerupAccumulator=0}if(coinAccumulator>=s.coinMs){spawnCoin();coinAccumulator=0}}
enemies.forEach((e,i)=>{e.y+=e.speed*scaledDt;e.rot+=e.rotS*scaledDt;if(checkHit(player,e)){if(e.super){score+=5;spawnFirework(e.x+e.size/2,e.y+e.size/2);enemies.splice(i,1);fx.push({x:e.x+e.size/2-10,y:e.y,vx:0,vy:-2,l:1.5,col:'#fbbf24',text:'x5',isText:true})}else if(activePowerup==='shield'){score+=2;spawnShieldBreak(e.x+e.size/2,e.y+e.size/2);enemies.splice(i,1)}else crash()}if(e.y>ch+100){enemies.splice(i,1);if(!e.super){score++;ui.live.innerText=score}}if(e.markedForCombo&&!e.cleared&&e.y>player.y+player.size+5&&!checkHit(player,e)){e.cleared=true;clearedEnemiesThisJump.push(e);jumpClearedCount=clearedEnemiesThisJump.length}});

if(player.y>=player.ground){player.y=player.ground;player.vy=0;const wasJumping=player.jumping;player.jumping=false;if(wasJumping&&jumpClearedCount>=2){comboCount++;showCombo(comboCount);sound.combo(comboCount);comboTimer=COMBO_WINDOW}clearedEnemiesThisJump=[];jumpClearedCount=0}


sides.forEach((e,i)=>{e.x+=e.speed*scaledDt;if(e.isRotating)e.rot+=e.rotS*scaledDt;if(checkHit(player,e)){if(activePowerup==='shield'){spawnShieldBreak(e.x+e.size/2,e.y+e.size/2);sides.splice(i,1)}else crash()}if(e.x<-150||e.x>cw+150)sides.splice(i,1)});

coins.forEach((c,i)=>{c.y+=c.speed*scaledDt;c.rot+=c.rotS*scaledDt;if(activePowerup==='magnet'){const dx=player.x+player.size/2-c.x;const dy=player.y+player.size/2-c.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150&&dist>0){c.x+=dx/dist*8*scaledDt;c.y+=dy/dist*8*scaledDt}}if(checkCoinHit(player,c)){sessionCoins++;ui.liveCoins.innerText=sessionCoins;sound.coin();haptics.coin();spawnCoinFX(c.x,c.y);coins.splice(i,1)}if(c.y>ch+50)coins.splice(i,1)});

powerups.forEach((p,i)=>{p.y+=p.speed*scaledDt;p.rot+=p.rotS;p.glow=(p.glow+0.1)%(Math.PI*2);if(checkCoinHit(player,p)){activatePowerup(p.type);spawnPowerupFX(p.x+p.size/2,p.y+p.size/2,p.type);powerups.splice(i,1)}if(p.y>ch+50)powerups.splice(i,1)});

fx.forEach((p,i)=>{p.x+=p.vx*scaledDt;p.y+=p.vy*scaledDt;p.l-=0.025*scaledDt;if(p.l<=0)fx.splice(i,1)});

if(comboTimer>0){comboTimer-=msPerFrame;if(comboTimer<=0)comboCount=0}
updateStars(scaledDt);}

function spawnFirework(x,y){sound.bonus();haptics.bonus();const colors=['#fbbf24','#f472b6','#38bdf8','#10b981','#f59e0b','#fff'];for(let i=0;i<50;i++)fx.push({x,y,vx:(Math.random()-0.5)*25,vy:(Math.random()-0.5)*25,l:1.5,col:colors[Math.floor(Math.random()*colors.length)]})}
function spawnShieldBreak(x,y){const colors=['#fbbf24','#f59e0b','#fcd34d'];for(let i=0;i<25;i++)fx.push({x,y,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,l:1.2,col:colors[Math.floor(Math.random()*colors.length)]})}

function checkHit(p,o){let b=o.size;if(o.evo===2)b*=1.45;if(o.evo===3)b*=1.85;const ox=o.x+o.size/2-b/2;const oy=o.y+o.size/2-b/2;return p.x+6<ox+b&&p.x+p.size-6>ox&&p.y+6<oy+b&&p.y+p.size-6>oy}
function checkCoinHit(p,c){return p.x<c.x+c.size&&p.x+p.size>c.x&&p.y<c.y+c.size&&p.y+p.size>c.y}

function drawPolygon(x,y,radius,sides,rotation){ctx.beginPath();for(let i=0;i<sides;i++){const angle=rotation+(i*2*Math.PI)/sides;const px=x+radius*Math.cos(angle);const py=y+radius*Math.sin(angle);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath();ctx.fill()}

function crash(){active=false;stopMusic();sound.crash();haptics.crash();spawnFX(player.x+player.size/2,player.y+player.size/2,'#ef4444',40,1.5);shakeIntensity=15;const totalCoins=addCoins(sessionCoins);ui.final.innerText=score;ui.sessionCoins.innerText=sessionCoins;ui.hud.style.display='none';ui.controls.style.display='none';ui.crash.style.display='flex';document.getElementById('powerupCanvas').style.display='none';if(saveHS(window.currentDiff,score))ui.newRecord.style.display='block'}

function draw(){ctx.save();if(shakeIntensity>0.5){shakeX=(Math.random()-0.5)*shakeIntensity;shakeY=(Math.random()-0.5)*shakeIntensity;ctx.translate(shakeX,shakeY);shakeIntensity*=0.9}else{shakeIntensity=0;shakeX=0;shakeY=0}ctx.clearRect(-10,-10,cw+20,ch+20);drawStars();ctx.strokeStyle='#1e293b';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,player.ground+player.size);ctx.lineTo(cw,player.ground+player.size);ctx.stroke();fx.forEach(p=>{ctx.globalAlpha=Math.max(0,p.l);ctx.fillStyle=p.col;if(p.isText){ctx.font='900 24px Orbitron';ctx.fillText(p.text,p.x,p.y)}else{ctx.fillRect(p.x,p.y,4,4)}});ctx.globalAlpha=1

enemies.forEach(e=>{ctx.save();ctx.translate(e.x+e.size/2,e.y+e.size/2);ctx.rotate(e.rot);ctx.fillStyle=e.color;if(e.super){const pulse=1+Math.sin(Date.now()/100)*0.1;ctx.scale(pulse,pulse);ctx.shadowBlur=15;ctx.shadowColor='#fbbf24';drawPolygon(0,0,e.size/2,5,-Math.PI/2)}else{switch(e.type){case'rect':ctx.fillRect(-e.size/2,-e.size/2,e.size,e.size);break;case'circle':ctx.beginPath();ctx.arc(0,0,e.size/2,0,Math.PI*2);ctx.fill();break;case'triangle':drawPolygon(0,0,e.size/2,3,0);break;case'pentagon':drawPolygon(0,0,e.size/2,5,0);break}if(e.evo>=2){ctx.globalAlpha=0.6;const s=e.size*0.45;ctx.fillRect(-e.size/2-s,-s/2,s,s);ctx.fillRect(e.size/2,-s/2,s,s);ctx.fillRect(-s/2,-e.size/2-s,s,s);ctx.fillRect(-s/2,e.size/2,s,s)}if(e.evo>=3){ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,e.size*1.35,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=0.4;ctx.fillRect(-e.size*1.65,-2,e.size*3.3,4);ctx.fillRect(-2,-e.size*1.65,4,e.size*3.3)}}ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1});

sides.forEach(e=>{ctx.save();if(e.isRotating){ctx.translate(e.x+e.size/2,e.y+e.size/2);ctx.rotate(e.rot);ctx.translate(-(e.x+e.size/2),-(e.y+e.size/2))}ctx.fillStyle=e.color;ctx.shadowBlur=12;ctx.shadowColor=e.color;ctx.fillRect(e.x,e.y,e.size,e.size);ctx.shadowBlur=0;ctx.restore()});

coins.forEach(c=>{ctx.save();ctx.translate(c.x+c.size/2,c.y+c.size/2);ctx.rotate(c.rot);ctx.fillStyle='#fbbf24';ctx.shadowBlur=10;ctx.shadowColor='#fbbf24';ctx.beginPath();ctx.arc(0,0,c.size/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fcd34d';ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;ctx.restore()});

powerups.forEach(p=>{ctx.save();ctx.translate(p.x+p.size/2,p.y+p.size/2);ctx.rotate(p.rot);const glow=0.5+Math.sin(p.glow)*0.3;ctx.shadowBlur=20*glow;const colors={shield:'#fbbf24',magnet:'#ef4444',slowmo:'#06b6d4'};const c=colors[p.type]||'#fff';ctx.shadowColor=c;ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.stroke();ctx.fillStyle=c;if(p.type==='shield'){ctx.fillRect(-6,-6,12,12)}else if(p.type==='magnet'){ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(8,4);ctx.lineTo(-8,4);ctx.closePath();ctx.fill()}else{ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill()}ctx.shadowBlur=0;ctx.restore()});

const tLen=player.trail.length;const trailColor=getTrailColor();const equippedTrail=getEquippedTrailData();player.trail.forEach((t,i)=>{ctx.globalAlpha=tLen>0?(i/tLen)*0.4:0;ctx.fillStyle=trailColor;if(!equippedTrail.type){ctx.fillRect(t.x,t.y,player.size,player.size)}else{const progress=i/tLen;const sz=equippedTrail.type==='hearts'?8:6;if(equippedTrail.type==='stardust'){ctx.save();ctx.translate(t.x+player.size/2,t.y+player.size/2);ctx.rotate(Date.now()/200+i);ctx.fillStyle=trailColor;for(var j=0;j<4;j++){var angle=j*Math.PI/2+Date.now()/300;ctx.fillRect(Math.cos(angle)*3-1,Math.sin(angle)*3-1,2,2)}ctx.restore()}else if(equippedTrail.type==='bubbles'){ctx.beginPath();ctx.arc(t.x+player.size/2,t.y+player.size/2,sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=(tLen>0?(i/tLen)*0.4:0)*0.5;ctx.strokeStyle=trailColor;ctx.lineWidth=1;ctx.stroke()}else if(equippedTrail.type==='sparks'){ctx.fillStyle=trailColor;ctx.fillRect(t.x+player.size/2-1,t.y+player.size/2+(i/tLen)*10,2,2)}else if(equippedTrail.type==='lightning'){ctx.strokeStyle=trailColor;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(t.x+player.size/2,t.y+player.size/2);ctx.lineTo(t.x+player.size/2+(Math.random()-0.5)*10,t.y+player.size/2+5);ctx.stroke()}else if(equippedTrail.type==='hearts'){ctx.fillStyle=trailColor;ctx.save();ctx.translate(t.x+player.size/2,t.y+player.size/2);ctx.scale(0.5,0.5);ctx.beginPath();ctx.moveTo(0,-5);ctx.bezierCurveTo(-5,-10,-10,-5,-5,0);ctx.bezierCurveTo(-2,5,0,8,0,8);ctx.bezierCurveTo(0,8,2,5,5,0);ctx.bezierCurveTo(10,-5,5,-10,0,-5);ctx.fill();ctx.restore()}}});trailParticles.forEach(function(p){ctx.globalAlpha=Math.max(0,p.l);ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,p.sz,p.sz)});ctx.globalAlpha=1;

ctx.globalAlpha=1;const skin=getEquippedSkinData();const glowColor=activePowerup==='shield'?'#fbbf24':null;if(skin.shape==='diamond'){ctx.save();ctx.shadowBlur=glowColor?25:15;ctx.shadowColor=glowColor||getPlayerColor();ctx.translate(player.x+player.size/2,player.y+player.size/2);ctx.rotate(Math.PI/4);ctx.fillStyle=skin.color==='rainbow'?getRainbowColor():skin.color;ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);ctx.shadowBlur=0;ctx.restore()}else if(skin.shape==='star'){ctx.save();ctx.shadowBlur=glowColor?25:15;ctx.shadowColor=glowColor||getPlayerColor();ctx.translate(player.x+player.size/2,player.y+player.size/2);ctx.rotate(Date.now()/500);ctx.fillStyle=skin.color==='rainbow'?getRainbowColor():skin.color;ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);ctx.shadowBlur=0;ctx.restore()}else{drawPlayerPattern(player.x,player.y,player.size,skin,glowColor)}ctx.fillStyle='#020617';ctx.fillRect(player.x+8,player.y+10,5,5);ctx.fillRect(player.x+player.size-13,player.y+10,5,5);

ctx.restore()}

function loop(now){if(!lastTime)lastTime=now;const delta=now-lastTime;lastTime=now;update(Math.min(delta/16.66,2.2));draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);})();
</script>
